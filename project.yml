name: LOLI
options:
  bundleIdPrefix: com.suraj
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

packages:
  DynamicNotchKit:
    url: https://github.com/MrKai77/DynamicNotchKit
    branch: main
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
  TelemetryDeck:
    url: https://github.com/TelemetryDeck/SwiftSDK
    from: "2.0.0"

targets:
  LOLI:
    type: application
    platform: macOS
    sources:
      - path: LOLI
        excludes:
          - "Fonts/**"
      - path: LOLI/Fonts
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.suraj.LOLI
        INFOPLIST_FILE: LOLI/Info.plist
        CODE_SIGN_ENTITLEMENTS: LOLI/LOLI.entitlements
        GENERATE_INFOPLIST_FILE: false
    dependencies:
      - package: DynamicNotchKit
      - package: Sparkle
      - package: TelemetryDeck
    entitlements:
      path: LOLI/LOLI.entitlements
      properties:
        com.apple.security.device.camera: true
        com.apple.security.network.client: true
